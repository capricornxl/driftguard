openapi: 3.0.3
info:
  title: DriftGuard API
  description: |
    DriftGuard - AI Agent Behavior Monitoring & Drift Detection System
    
    ## Overview
    DriftGuard monitors AI agent behavior in production environments, detecting:
    - Performance drift (latency, efficiency degradation)
    - Consistency issues (response variability)
    - Accuracy decline
    - Hallucination patterns
    - Behavioral anomalies
    
    ## Authentication
    Currently, the API does not require authentication. This will be added in future releases.
    
    ## Rate Limiting
    Rate limiting is not yet implemented. Planned for v0.2.0.
  version: 0.1.0
  contact:
    name: DriftGuard Team
    url: https://github.com/capricornxl/driftguard
    email: support@driftguard.dev
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.driftguard.dev
    description: Production server

tags:
  - name: Health
    description: Health check and readiness endpoints
  - name: Agents
    description: Agent management and monitoring
  - name: Metrics
    description: Prometheus metrics
  - name: Alerts
    description: Alert management

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the DriftGuard service
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Returns whether the service is ready to accept traffic
      operationId: getReady
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'

  /api/v1/agents:
    get:
      tags:
        - Agents
      summary: List all agents
      description: Returns a list of all monitored agents
      operationId: listAgents
      parameters:
        - name: limit
          in: query
          description: Maximum number of agents to return
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Number of agents to skip
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{agentId}:
    get:
      tags:
        - Agents
      summary: Get agent details
      description: Returns detailed information about a specific agent
      operationId: getAgent
      parameters:
        - name: agentId
          in: path
          description: Agent ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{agentId}/health:
    get:
      tags:
        - Agents
      summary: Get agent health score
      description: Returns the current health score for a specific agent
      operationId: getAgentHealth
      parameters:
        - name: agentId
          in: path
          description: Agent ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthScore'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{agentId}/history:
    get:
      tags:
        - Agents
      summary: Get agent health history
      description: Returns historical health scores for a specific agent
      operationId: getAgentHistory
      parameters:
        - name: agentId
          in: path
          description: Agent ID
          required: true
          schema:
            type: string
        - name: startTime
          in: query
          description: Start time (RFC3339 format)
          required: false
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          description: End time (RFC3339 format)
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of records to return
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HealthScore'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/alerts:
    get:
      tags:
        - Alerts
      summary: List all alerts
      description: Returns a list of all alerts
      operationId: listAlerts
      parameters:
        - name: severity
          in: query
          description: Filter by severity
          required: false
          schema:
            type: string
            enum: [info, warning, critical]
        - name: status
          in: query
          description: Filter by status
          required: false
          schema:
            type: string
            enum: [active, acknowledged, resolved]
        - name: limit
          in: query
          description: Maximum number of alerts to return
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /metrics:
    get:
      tags:
        - Metrics
      summary: Prometheus metrics
      description: Returns metrics in Prometheus exposition format
      operationId: getMetrics
      responses:
        '200':
          description: Successful response
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP driftguard_health_score Current health score per agent
                  # TYPE driftguard_health_score gauge
                  driftguard_health_score{agent_id="agent-1"} 85.5
                  # HELP driftguard_response_time_seconds Response time histogram
                  # TYPE driftguard_response_time_seconds histogram
                  driftguard_response_time_seconds_bucket{le="0.1"} 100

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        uptime:
          type: string
          description: Human-readable uptime
      example:
        status: healthy
        timestamp: "2026-03-14T01:41:00Z"
        version: "0.1.0"
        uptime: "2h 15m 30s"

    ReadyResponse:
      type: object
      properties:
        ready:
          type: boolean
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          properties:
            database:
              type: boolean
            config:
              type: boolean
      example:
        ready: true
        timestamp: "2026-03-14T01:41:00Z"
        checks:
          database: true
          config: true

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, inactive, degraded]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgentDetail:
      allOf:
        - $ref: '#/components/schemas/Agent'
        - type: object
          properties:
            healthScore:
              $ref: '#/components/schemas/HealthScore'
            metrics:
              $ref: '#/components/schemas/AgentMetrics'
            config:
              $ref: '#/components/schemas/AgentConfig'

    AgentMetrics:
      type: object
      properties:
        avgLatency:
          type: number
          format: float
          description: Average latency in seconds
        p95Latency:
          type: number
          format: float
          description: 95th percentile latency in seconds
        requestsPerMinute:
          type: number
          format: float
        errorRate:
          type: number
          format: float
          description: Error rate as percentage

    AgentConfig:
      type: object
      properties:
        model:
          type: string
        provider:
          type: string
        maxTokens:
          type: integer
        temperature:
          type: number
          format: float

    HealthScore:
      type: object
      properties:
        agentId:
          type: string
        score:
          type: number
          format: float
          minimum: 0
          maximum: 100
        components:
          $ref: '#/components/schemas/HealthComponents'
        trend:
          type: string
          enum: [improving, stable, declining]
        timestamp:
          type: string
          format: date-time

    HealthComponents:
      type: object
      properties:
        latency:
          type: number
          format: float
          description: Latency score (0-100)
        efficiency:
          type: number
          format: float
          description: Efficiency score (0-100)
        consistency:
          type: number
          format: float
          description: Consistency score (0-100)
        accuracy:
          type: number
          format: float
          description: Accuracy score (0-100)
        hallucination:
          type: number
          format: float
          description: Hallucination score (0-100, lower is better)

    Alert:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        type:
          type: string
          enum: [drift, anomaly, threshold, mutation]
        severity:
          type: string
          enum: [info, warning, critical]
        status:
          type: string
          enum: [active, acknowledged, resolved]
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      example:
        code: "NOT_FOUND"
        message: "Agent not found"
        details:
          agentId: "agent-123"
