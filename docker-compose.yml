version: '3.8'

services:
  driftguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: driftguard
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=driftguard
      - DB_USER=driftguard
      - DB_PASSWORD=driftguard123
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - driftguard-data:/var/lib/driftguard
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - driftguard-network

  postgres:
    image: postgres:15-alpine
    container_name: driftguard-db
    environment:
      - POSTGRES_DB=driftguard
      - POSTGRES_USER=driftguard
      - POSTGRES_PASSWORD=driftguard123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftguard -d driftguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - driftguard-network

  prometheus:
    image: prom/prometheus:latest
    container_name: driftguard-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - driftguard
    restart: unless-stopped
    networks:
      - driftguard-network

  grafana:
    image: grafana/grafana:latest
    container_name: driftguard-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - driftguard-network

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  driftguard-data:

networks:
  driftguard-network:
    driver: bridge
