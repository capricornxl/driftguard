version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: driftguard-db
    environment:
      POSTGRES_DB: driftguard
      POSTGRES_USER: driftguard
      POSTGRES_PASSWORD: driftguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  driftguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: driftguard-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=driftguard
      - DB_PASSWORD=driftguard
      - DB_NAME=driftguard
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.json:/app/config.json

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: driftguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - driftguard

  grafana:
    image: grafana/grafana:10.1.0
    container_name: driftguard-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=driftguard
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafanadata:/var/lib/grafana
      - ./deploy/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./deploy/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
  promdata:
  grafanadata:
